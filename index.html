<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Cumple Avril 🎉</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    overflow: hidden;
}

/* Pantallas */
.pantalla {
    width: 100%;
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#pantalla1 {
    display: flex;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
}

#pantalla2 {
    background: linear-gradient(135deg, #43cea2, #185a9d);
}

/* Título */
h1 {
    font-size: 40px;
}

/* Torta gigante */
.boton-cumple {
    font-size: 120px;
    cursor: pointer;
    animation: latido 1s infinite;
}

@keyframes latido {
    0%, 100% {transform: scale(1);}
    50% {transform: scale(1.2);}
}

/* Foto */
.foto {
    width: 80%;
    max-width: 500px;
    border-radius: 20px;
    margin-top: 20px;
    animation: aparecer 2s ease;
}

@keyframes aparecer {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* Corazones */
.corazon {
    position: absolute;
    font-size: 20px;
    animation: subir 5s linear infinite;
}

@keyframes subir {
    0% { transform: translateY(100vh); opacity: 1;}
    100% { transform: translateY(-10vh); opacity: 0;}
}

/* Canvas fuegos */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}
</style>
</head>

<body>

<!-- MUSICA -->
<audio id="musica" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- PANTALLA 1 -->
<div id="pantalla1" class="pantalla">
    <h1>🎉 FELIZ CUMPLEAÑOS AVRIL YA 16 AÑITOS 🎂</h1>
    <div class="boton-cumple" onclick="irAPantalla2()">🎂</div>
    <p>tocá la torta 😏</p>
</div>

<!-- PANTALLA 2 -->
<div id="pantalla2" class="pantalla">
    <h1>💙 TE AMO MUCHO SOS TOP AMISTADES QUE MÁS AMO Y OJALÁ SEAMOS AMIGOS SIEMPRE 💙</h1>
    <img src="foto.jpg" class="foto">
</div>

<canvas id="fuegos"></canvas>

<script>
const musica = document.getElementById("musica");

function irAPantalla2() {
    document.getElementById("pantalla1").style.display = "none";
    document.getElementById("pantalla2").style.display = "flex";
    musica.play();
    lanzarFuegos();
}

// Corazones
function crearCorazon() {
    const corazon = document.createElement("div");
    corazon.classList.add("corazon");
    corazon.innerText = "💖";
    corazon.style.left = Math.random() * 100 + "vw";
    corazon.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(corazon);

    setTimeout(() => corazon.remove(), 5000);
}
setInterval(crearCorazon, 300);

// Fuegos artificiales
const canvas = document.getElementById("fuegos");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function lanzarFuegos() {
    setInterval(() => {
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: canvas.width / 2,
                y: canvas.height / 2,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 100
            });
        }
    }, 800);
}

function animarFuegos() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;

        ctx.fillStyle = "white";
        ctx.fillRect(p.x, p.y, 2, 2);

        if (p.life <= 0) particles.splice(i, 1);
    });

    requestAnimationFrame(animarFuegos);
}
animarFuegos();
</script>

</body>
</html>
